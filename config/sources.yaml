# ---- Workday public CXS tenants ------------------------------------------
# Each org defines `tenant` (subdomain) and `site` (board id). Find them by
# opening the careers URL:
#   https://{tenant}.wd1.myworkdayjobs.com/en-US/{site}
# The scraper auto-probes wd1/wd3/wd5/wd103.
workday:
  enabled: false
  organizations:
    - { company: NVIDIA,     tenant: nvidia,     site: NVIDIAExternalCareerSite, enabled: true }
    - { company: Salesforce, tenant: salesforce, site: External_Career_Site,     enabled: true }
    - { company: Adobe,      tenant: adobe,      site: external_experienced,     enabled: true }
    - { company: Cisco,      tenant: cisco,      site: Cisco,                    enabled: true }
    - { company: JPMorgan,   tenant: jpmc,       site: jpmc,                     enabled: true }
    - { company: Intuit,     tenant: intuit,     site: IntuitCareers,            enabled: true }
    - { company: Ford,       tenant: ford,       site: FordCareers,              enabled: true }
    - { company: "3M",       tenant: 3m,         site: Search,                   enabled: true }


# ---- JobSpy (LinkedIn, Indeed, Glassdoor, ZipRecruiter, Google Jobs) -----
# Enable via Settings, or flip `enabled: true` here. Search terms live in
# your profile under sources.jobspy_search_terms. JobSpy is rate-limit
# sensitive: keep results_per_term modest.
jobspy:
  enabled: false
  linkedin: true
  indeed: true
  glassdoor: true
  ziprecruiter: true
  google: true
  cache_ttl_seconds: 1800
