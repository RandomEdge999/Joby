# Joby source config.
#
# Each entry under `ats_sources` targets a public job-board API (no
# authentication needed). Supported `type` values: greenhouse, lever, ashby,
# smartrecruiters, workable, recruitee.
#
# `slug` is the board identifier used by the vendor API (NOT the careers-page
# URL). If a company moves ATS or renames its board, toggle `enabled: false`
# until it's updated.
#
# Workday lives in its own block because it needs `tenant` + `site`.
# JobSpy (LinkedIn/Indeed/Glassdoor/ZipRecruiter/Google Jobs) is enabled
# globally plus per-site; per-user search terms come from the profile.

